# Local dev for the Cube semantic layer.
# Prerequisite: `make forward` (repo root) so ClickHouse is reachable on the host
# at :8123; Cube reaches it through the host-gateway alias below, mirroring
# orchestrator/docker-compose.yml.
services:
  cube:
    image: cubejs/cube:latest
    container_name: semantic-cube
    ports:
      - "4000:4000"     # REST API + dev playground
      - "15432:15432"   # SQL API (Postgres wire protocol)
    env_file: .env
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_DB_TYPE=clickhouse
      - CUBEJS_DB_HOST=${CLICKHOUSE_ENDPOINT_URL:-warehouse-clickhouse-headless}
      - CUBEJS_DB_PORT=${CLICKHOUSE_HTTP_PORT:-8123}
      - CUBEJS_DB_NAME=curated
      - CUBEJS_DB_USER=default
      - CUBEJS_DB_PASS=${CLICKHOUSE_PASSWORD:-}
      - CUBEJS_DB_CLICKHOUSE_READONLY=true
      - CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-secret}
      - CUBEJS_PG_SQL_PORT=15432
      - CUBEJS_SQL_USER=${CUBEJS_SQL_USER:-cube}
      - CUBEJS_SQL_PASSWORD=${CUBEJS_SQL_PASSWORD:-cube}
    volumes:
      - ./model:/cube/conf/model
      - ./cube.js:/cube/conf/cube.js
    extra_hosts:
      - "warehouse-clickhouse-headless:host-gateway"
