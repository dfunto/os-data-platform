name: noaa_ghcn
description: "Public GHCN (Global Historical Climatology Network) data from the NOAA (National Oceanic and Atmospheric Administration)"
source_type: s3
s3_config:
  bucket: noaa-ghcn-pds
  disable_auth: true
  tables:
    - name: countries
      description: "List of country codes (FIPS) and names"
      prefix: "ghcnd-countries.txt"
      file_format: Regexp
      full_refresh: true
      columns:
        - name: code
        - name: name
      settings:
        format_regexp: "^(.{2}) (.+)$"
    - name: states
      description: "List of U.S. state and Canadian Province codes used in stations tables"
      prefix: "ghcnd-states.txt"
      file_format: Regexp
      full_refresh: true
      columns:
        - name: code
        - name: name
      settings:
        format_regexp: "^(.{2}) (.+)$"
    - name: inventory
      description: "File listing the periods of record for each station and element"
      prefix: "ghcnd-inventory.txt"
      file_format: LineAsString
      full_refresh: true
      columns:
        - name: station_id
          expression: "substring(line, 1, 11)"
        - name: latitude
          expression: "substring(line, 13, 8)"
        - name: longitude
          expression: "substring(line, 22, 9)"
        - name: element
          expression: "substring(line, 32, 4)"
        - name: first_year
          expression: "substring(line, 37, 4)"
        - name: last_year
          expression: "substring(line, 42, 4)"
    - name: stations
      description: "List of stations and their metadata (e.g., coordinates)"
      prefix: "ghcnd-stations.txt"
      file_format: LineAsString
      full_refresh: true
      columns:
        - name: station_id
          expression: "substring(line, 1, 11)"
        - name: latitude
          expression: "substring(line, 13, 8)"
        - name: longitude
          expression: "substring(line, 22, 9)"
        - name: elevation
          expression: "substring(line, 32, 6)"
        - name: state
          expression: "substring(line, 39, 2)"
        - name: name
          expression: "substring(line, 42, 30)"
        - name: gsn_flag
          expression: "substring(line, 73, 3)"
        - name: hcn_crn_flag
          expression: "substring(line, 77, 3)"
        - name: wmo_id
          expression: "substring(line, 81, 5)"
    - name: observations
      description: "Daily weather observations"
      prefix: "parquet/by_year/"
      file_format: Parquet
      partitions:
        - type: time
          name: "YEAR"
          start: "2024-01-01"  # Keep dataset small
          cron: "0 0 1 1 *"  # one partition per year
          format: "%Y"
      settings:
        use_hive_partitioning: "1"
