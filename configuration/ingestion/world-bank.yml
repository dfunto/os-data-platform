name: world_bank
description: "Free public API providing global development indicators including GDP, population, poverty, education, and health metrics across 200+ countries from 1960 to present"
source_type: api
api_config:
  params:
    start_year: "2000"
    end_year: "2024"
  tables:
    - name: countries
      full_refresh: true
      url: https://api.worldbank.org/v2/country/all
      primary_key: id
    - name: gdp
      full_refresh: true
      url: https://api.worldbank.org/v2/country/all/indicator/NY.GDP.MKTP.CD
      primary_key: [countryiso3code, date]
      params:
        date: "{start_year}:{end_year}"
    - name: population
      full_refresh: true
      url: https://api.worldbank.org/v2/country/all/indicator/SP.POP.TOTL
      primary_key: [countryiso3code, date]
      params:
        date: "{start_year}:{end_year}"
