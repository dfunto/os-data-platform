x-dagster-image: &dagster_image
  build:
    context: .
    additional_contexts:
      - libs=../libs
      - transform=../transform
  image: dadutra2/os-data-platform-orchestrator:latest
  env_file: .env
  environment:
    - SEAWEEDFS_S3_SECRET_ACCESS_KEY=$OS_DATA_PLATFORM_STORAGE_ROOT_PASSWORD
    - OS_DATA_PLATFORM_METADATA_DB_PLATFORM_PASSWORD=$OS_DATA_PLATFORM_METADATA_DB_PLATFORM_PASSWORD
    - CLICKHOUSE_ENDPOINT_URL=${CLICKHOUSE_ENDPOINT_URL:-warehouse-clickhouse-headless}
    - CLICKHOUSE_HTTP_PORT=${CLICKHOUSE_HTTP_PORT:-8123}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
  extra_hosts:
    - "storage-seaweedfs-s3:host-gateway"
    - "warehouse-clickhouse-headless:host-gateway"

services:
  postgres:
    image: postgres:15
    container_name: dagster-postgres
    env_file: .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5

  user_code:
    <<: *dagster_image
    # Rebuild the dbt manifest from the mounted project (the ../transform bind
    # shadows the image-baked manifest), then start the gRPC code server.
    command: >
      sh -c "dbt parse --project-dir /transform --profiles-dir /transform &&
             exec dagster code-server start -h 0.0.0.0 -p 3030 -f src/definitions.py"
    container_name: dagster-user-code
    volumes:
      - ./dagster.yaml:/dagster/dagster.yaml
      - ./src:/orchestrator/src
      - ../transform:/transform
      - ../configuration:/orchestrator/configuration
      - ~/.kube/config:/root/.kube/config:ro
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -p 3030"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  webserver:
    <<: *dagster_image
    container_name: dagster-webserver
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /dagster/workspace.yaml
    ports:
      - "3000:3000"
    volumes:
      - ./dagster.yaml:/dagster/dagster.yaml
      - ./workspace.yaml:/dagster/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy

  daemon:
    <<: *dagster_image
    container_name: dagster-daemon
    command: dagster-daemon run -w /dagster/workspace.yaml
    volumes:
      - ./dagster.yaml:/dagster/dagster.yaml
      - ./workspace.yaml:/dagster/workspace.yaml
    depends_on:
      postgres:
        condition: service_healthy
      user_code:
        condition: service_healthy