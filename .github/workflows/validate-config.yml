name: validate config

on:
  push:
    paths:
      - "configuration/**"
      - "orchestrator/src/common/**"
  pull_request:
    paths:
      - "configuration/**"
      - "orchestrator/src/common/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install common deps
        run: uv pip install --system pydantic pyyaml croniter kubernetes

      - name: Validate configs
        run: PYTHONPATH=orchestrator/src python .github/scripts/validate_config.py configuration
