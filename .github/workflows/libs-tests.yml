name: libs tests

on:
  push:
    paths:
      - "libs/**"
  pull_request:
    paths:
      - "libs/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --extra dev

      - run: uv run python -m pytest
