global:
  edition: community
  auth:
    instanceAdmin:
      email: "admin@airbyte.io"
      password: "admin"
  database:
    host: "metadata-postgresql"
    port: "5432"
    name: "airbyte"
    secretName: "ingestor-postgresql-secret"
    userSecretKey: "DATABASE_USER"
    passwordSecretKey: "DATABASE_PASSWORD"
  storage:
    type: minio
    secretName: storage-seaweedfs-secret
    bucket:
      log: airbyte-metadata
      state: airbyte-metadata
      workloadOutput: airbyte-metadata
      auditLogging: airbyte-metadata
      activityPayload: airbyte-metadata
    minio:
      endpoint: "http://storage-seaweedfs-s3.os-data-platform.svc.cluster.local:8333"
      accessKeyIdSecretKey: "SEAWEEDFS_S3_ACCESS_KEY_ID"
      secretAccessKeySecretKey: "SEAWEEDFS_S3_SECRET_ACCESS_KEY"

postgresql:
  enabled: false

minio:
  enabled: false

cron:
  enabled: false

server:
  replicaCount: 1

worker:
  replicaCount: 1
