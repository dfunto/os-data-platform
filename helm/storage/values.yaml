seaweedfs:
  master:
    enabled: true
    replicas: 1

  volume:
    enabled: true
    replicas: 1

  filer:
    enabled: true
    replicas: 1

  s3:
    enabled: true
    replicas: 1
    port: 8333
    enableAuth: true
    existingConfigSecret: storage-seaweedfs-secret
    createBuckets:
      - name: os-data-platform-ingestor
        anonymousRead: false
      - name: lakehouse-raw
        anonymousRead: false
