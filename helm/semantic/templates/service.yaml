apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cube
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semantic.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "semantic.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest
      port: {{ .Values.api.restPort }}
      targetPort: rest
    - name: sql
      port: {{ .Values.api.sqlPort }}
      targetPort: sql
