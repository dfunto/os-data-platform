apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: {{ .Values.service.port | quote }}
            - name: CUBE_URL
              value: {{ .Values.cube.url | quote }}
          # CUBEJS_API_SECRET is supplied by the secret (same as the Cube instance).
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
